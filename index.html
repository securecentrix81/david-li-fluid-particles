<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Fluid Particles</title>

        <meta name="description" content="Real-time particle-based 3D fluid simulation and rendering using WebGL.">

        <link href='https://fonts.googleapis.com/css?family=Asap:400,700' rel='stylesheet' type='text/css'>
        <link rel="stylesheet" href="flip.css"/>
    </head>

    <body>
        <script type="text/template" id="main">
            <style>
                .editing-ui {
                    display: none;
                }

                .simulating-ui {
                    display: none;
                }
            </style>

            <canvas id="canvas" width="1920" height="1080"></canvas>
            
            <div id="ui">
                <div id="start-button">Start</div>

                <div id="preset-button" class="editing-ui">Random Preset</div>

                <div class="slider-label editing-ui">Particle Density</div>
                <div id="density-slider" class="slider editing-ui"></div>

                <div id="particle-count" class="editing-ui"></div>

                <div class="slider-label simulating-ui">Fluidity</div>
                <div id="fluidity-slider" class="slider simulating-ui"></div>

                <div class="slider-label simulating-ui">Speed</div>
                <div id="speed-slider" class="slider simulating-ui"></div>
            </div>


            <div class="instructions editing-ui">
                <span>Space + drag</span> to rotate camera <br/>
                <span>Scroll</span> to zoom in and out <br/>
                <br/>
                <span>Draw on walls</span> to create new boxes <br/>
                <span>Drag box faces</span> to resize <br/>
                <span>Shift + drag box faces</span> to translate <br/>
            </div>

            <div class="instructions simulating-ui">
                <span>Drag</span> to rotate camera<br/>
                <span>Scroll</span> to zoom in and out <br/>
                <span>Move mouse</span> to push particles
            </div>

            <div id="footer">
               <a href="http://david.li">david.li</a> | <a href="https://youtu.be/DhNt_A3k4B4">Video</a> | <a href="https://github.com/dli/fluid">Code</a>  
            </div>
        </script>

        <script type="text/template" id="no-support">
            <div id="container">
                <div id="error"></div>
                <div id="video">You can still view a video.<br/>
                    <iframe width="854" height="480" style="margin-top: 7px;" src="https://www.youtube.com/embed/DhNt_A3k4B4" frameborder="0" allowfullscreen></iframe> 
                </div>
                <div id="linkback"><a href="http://david.li">david.li</a></div>
            </div>
        </script>


        <div id="placeholder"></div>


        <script src="wrappedgl.js"></script>
        <script src="utilities.js"></script>
        <script src="camera.js"></script>
        <script src="boxeditor.js"></script>
        <script src="simulator.js"></script>
        <script src="renderer.js"></script>
        <script src="simulatorrenderer.js"></script>
        <script src="slider.js"></script>
        <script src="fluidparticles.js"></script>
<script>
    function concatenateWords(list) {
        if (list.length === 0) {
            return '';
        } else if (list.length === 1) {
            return "'" + list[0] + "'";
        } else {
            var result = '';
            for (var i = 0; i < list.length; ++i) {
                result += "'" + list[i] + "'";
                if (i < list.length - 1) {
                    result += i < list.length - 2 ? ', ' : ' and ';
                }
            }
            return result;
        }
    }

    function installErrorOverlay() {
        var errorBox = document.createElement('div');
        errorBox.id = 'mobile-error-overlay';
        errorBox.style.position = 'fixed';
        errorBox.style.left = '0';
        errorBox.style.right = '0';
        errorBox.style.bottom = '0';
        errorBox.style.maxHeight = '45vh';
        errorBox.style.overflow = 'auto';
        errorBox.style.background = 'rgba(120,0,0,0.92)';
        errorBox.style.color = '#fff';
        errorBox.style.fontFamily = 'monospace';
        errorBox.style.fontSize = '12px';
        errorBox.style.lineHeight = '1.4';
        errorBox.style.padding = '10px';
        errorBox.style.zIndex = '999999';
        errorBox.style.whiteSpace = 'pre-wrap';
        errorBox.style.display = 'none';
        document.body.appendChild(errorBox);

        function showError(message) {
            errorBox.style.display = 'block';
            errorBox.textContent += message + '\n';
        }

        window.addEventListener('error', function (event) {
            showError(
                '[error] ' +
                (event.message || 'Unknown error') +
                (event.filename ? '\n' + event.filename + ':' + event.lineno + ':' + event.colno : '')
            );
        });

        window.addEventListener('unhandledrejection', function (event) {
            var reason = event.reason;
            showError('[promise] ' + (reason && reason.stack ? reason.stack : String(reason)));
        });

        return showError;
    }

    function createBootOverlay(onStart) {
        var overlay = document.createElement('div');
        overlay.id = 'boot-overlay';
        overlay.style.position = 'fixed';
        overlay.style.left = '0';
        overlay.style.top = '0';
        overlay.style.width = '100vw';
        overlay.style.height = '100vh';
        overlay.style.background = '#111';
        overlay.style.color = '#fff';
        overlay.style.display = 'flex';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        overlay.style.flexDirection = 'column';
        overlay.style.zIndex = '999998';
        overlay.style.fontFamily = 'Asap, sans-serif';
        overlay.style.textAlign = 'center';

        var button = document.createElement('div');
        button.textContent = 'Tap to Start';
        button.style.padding = '18px 28px';
        button.style.border = '2px solid #fff';
        button.style.borderRadius = '8px';
        button.style.fontSize = '24px';
        button.style.cursor = 'pointer';
        button.style.userSelect = 'none';

        var subtitle = document.createElement('div');
        subtitle.textContent = 'This may request motion permission on iPhone/iPad.';
        subtitle.style.marginTop = '16px';
        subtitle.style.fontSize = '14px';
        subtitle.style.opacity = '0.8';

        overlay.appendChild(button);
        overlay.appendChild(subtitle);
        document.body.appendChild(overlay);

        function start() {
            button.textContent = 'Starting...';
            button.style.pointerEvents = 'none';
            Promise.resolve(onStart()).then(function () {
                if (overlay.parentNode) {
                    overlay.parentNode.removeChild(overlay);
                }
            }).catch(function (error) {
                button.textContent = 'Tap to Start';
                button.style.pointerEvents = 'auto';
                throw error;
            });
        }

        overlay.addEventListener('click', start);
        overlay.addEventListener('touchend', function (e) {
            e.preventDefault();
            start();
        }, { passive: false });
    }

    var showError = installErrorOverlay();

    WrappedGL.checkWebGLSupportWithExtensions(
        [
            'ANGLE_instanced_arrays',
            'WEBGL_depth_texture',
            'OES_texture_float',
            'OES_texture_float_linear',
            'OES_texture_half_float',
            'OES_texture_half_float_linear'
        ],
        function () {
            createBootOverlay(function () {
                var requestMotionPermission = Promise.resolve();

                if (
                    window.DeviceMotionEvent &&
                    typeof window.DeviceMotionEvent.requestPermission === 'function'
                ) {
                    requestMotionPermission = window.DeviceMotionEvent.requestPermission()
                        .then(function (state) {
                            // not fatal if denied; simulator should fall back
                            return state;
                        })
                        .catch(function (error) {
                            showError('Device motion permission request failed: ' + error);
                        });
                }

                return requestMotionPermission.then(function () {
                    document.getElementById('placeholder').outerHTML =
                        document.getElementById('main').innerHTML;

                    window.fluidBox = new FluidParticles();
                });
            });
        },
        function (hasWebGL, unsupportedExtensions) {
            document.getElementById('placeholder').outerHTML =
                document.getElementById('no-support').innerHTML;

            if (!hasWebGL) {
                document.getElementById('error').textContent =
                    'Unfortunately, your browser does not support WebGL';
            } else {
                document.getElementById('error').textContent =
                    'Unfortunately, your browser does not support the ' +
                    concatenateWords(unsupportedExtensions) +
                    ' WebGL extension' +
                    (unsupportedExtensions.length > 1 ? 's.' : '.');
            }
        }
    );
</script>
    </body>

</html>
